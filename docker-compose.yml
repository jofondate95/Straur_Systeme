version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:14-alpine
    container_name: straur_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-straur_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-straur_password}
      POSTGRES_DB: ${DATABASE_NAME:-straur_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - straur-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-straur_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: straur_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - straur-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # NestJS Backend API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: straur_backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - MTN_MOMO_API_KEY=${MTN_MOMO_API_KEY}
      - ORANGE_MONEY_API_KEY=${ORANGE_MONEY_API_KEY}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - SMS_ACCOUNT_SID=${SMS_ACCOUNT_SID}
      - SMS_AUTH_TOKEN=${SMS_AUTH_TOKEN}
      - QR_CODE_SECRET_KEY=${QR_CODE_SECRET_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - straur-network
    restart: unless-stopped

  # ============================================
  # React Admin Dashboard
  # ============================================
  web-admin:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: straur_web_admin
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api
      - REACT_APP_SOCKET_IO_URL=http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./web-admin:/app
      - /app/node_modules
    networks:
      - straur-network
    restart: unless-stopped

  # ============================================
  # Terminal PWA (Validation QR)
  # ============================================
  terminal-pwa:
    build:
      context: ./terminal-pwa
      dockerfile: Dockerfile
    container_name: straur_terminal_pwa
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api
      - REACT_APP_SOCKET_IO_URL=http://localhost:3000
    ports:
      - "3002:3000"
    depends_on:
      - backend
    volumes:
      - ./terminal-pwa:/app
      - /app/node_modules
    networks:
      - straur-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  straur-network:
    driver: bridge
