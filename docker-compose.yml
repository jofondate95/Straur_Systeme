version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: straur-postgres
    environment:
      POSTGRES_USER: straur_user
      POSTGRES_PASSWORD: straur_password
      POSTGRES_DB: straur_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - straur-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U straur_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: straur-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - straur-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: straur-backend
    environment:
      DATABASE_URL: postgresql://straur_user:straur_password@postgres:5432/straur_db
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY}
      MTN_MOMO_PRIMARY_KEY: ${MTN_MOMO_PRIMARY_KEY}
      ORANGE_MONEY_API_KEY: ${ORANGE_MONEY_API_KEY}
      ORANGE_MONEY_SECRET: ${ORANGE_MONEY_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      QR_CODE_ENCRYPTION_KEY: ${QR_CODE_ENCRYPTION_KEY}
      QR_CODE_HMAC_SECRET: ${QR_CODE_HMAC_SECRET}
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - straur-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:

networks:
  straur-network:
    driver: bridge
